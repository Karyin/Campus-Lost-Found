<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage My Posts - Campus L&F</title>
    <style>
         * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #f8f8f9; color: #333; line-height: 1.6; }

        .navbar { background-color: #000000; display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; color: white; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 24px; font-weight: normal; letter-spacing: 1px; }
        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-links a { color: white; text-decoration: none; font-size: 15px; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: #cccccc; }
        .nav-btn-white { background-color: white; color: black !important; padding: 10px 18px; border-radius: 20px; font-weight: bold !important; transition: background 0.2s; }
        .nav-btn-white:hover { background-color: #e2e2e2; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        h2 { margin-bottom: 30px; font-size: 28px; }
        
        .post-list { display: flex; flex-direction: column; gap: 20px; }

        .post-item { 
            background: white; border-radius: 15px; padding: 20px; 
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .post-item:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }

        .item-info { display: flex; align-items: center; gap: 20px; }
        .item-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: #eee; }
        
        .item-details h3 { font-size: 18px; margin-bottom: 5px; }
        .item-details p { font-size: 13px; color: #777; }

        .status-badge { 
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; 
            text-transform: uppercase; display: flex; align-items: center; justify-content: center;
        }
        .status-active { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-resolved { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; text-decoration: line-through; }

        .actions { display: flex; gap: 8px; align-items: center; }
        .btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        
        .btn-status { background: #000; color: #fff; }
        .btn-edit { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .btn-edit:hover { background: #e5e7eb; }
        .btn-delete { background: #fee2e2; color: #ef4444; }
        .btn-delete:hover { background: #ef4444; color: #fff; }

        .empty-msg { text-align: center; padding: 50px; color: #999; }

        .modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(4px); 
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px; 
            width: 90%; max-width: 500px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .close-modal {
            position: absolute; top: 15px; right: 20px; font-size: 24px; 
            cursor: pointer; color: #999; transition: 0.2s;
        }
        .close-modal:hover { color: #000; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; 
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #000; }
        .btn-save { width: 100%; padding: 12px; background: #000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

     <nav class="navbar">
        <div class="nav-brand">QIU Campus Lost And Found</div>
        <div class="nav-links">
            <a href="userdashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <h2>📦 Manage My Posts</h2>
        <div id="postContainer" class="post-list">
            <p class="empty-msg">Loading your posts...</p>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <h3 style="margin-bottom: 20px; font-size: 22px;">Edit Post</h3>
            
            <form id="editForm">
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="edit-title" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="edit-location" required>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="edit-date" required>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="edit-contact" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="edit-description" rows="3"></textarea>
                </div>
                
                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        const userEmail = localStorage.getItem('userEmail');
        let myItemsData = []; // Global variable used to store the retrieved data for easy access during editing.

        if (!userEmail) window.location.href = 'login.html';

        async function fetchMyPosts() {
            try {
                const res = await fetch(`/api/items/my-posts?email=${userEmail}`);
                myItemsData = await res.json(); // Store in global variable
                renderPosts(myItemsData);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('postContainer');
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-msg">You haven\'t posted anything yet.</div>';
                return;
            }

            container.innerHTML = posts.map(item => `
                <div class="post-item">
                    <div class="item-info">
                        ${item.imageUrl ? `<img src="${item.imageUrl}" class="item-img" alt="item">` : ''}
                        <div class="item-details">
                            <h3>${item.title}</h3>
                            <p>${item.location} • ${item.date}</p>
                        </div>
                    </div>
                    <div class="actions">
                        <span class="status-badge ${item.status === 'Active' ? 'status-active' : 'status-resolved'}">
                            ${item.status}
                        </span>
                        
                        <button class="btn btn-edit" onclick="openEditModal('${item._id}')">Edit</button>
                        
                        <button class="btn btn-status" onclick="toggleStatus('${item._id}', '${item.status}')">
                            ${item.status === 'Active' ? 'Mark Resolved' : 'Re-activate'}
                        </button>
                        <button class="btn btn-delete" onclick="deleteItem('${item._id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function openEditModal(id) {
            // Find the item data that the user clicked in the global array.
            const item = myItemsData.find(i => i._id === id);
            
            // Automatically fill in the original data into the input box
            document.getElementById('edit-id').value = item._id;
            document.getElementById('edit-title').value = item.title;
            document.getElementById('edit-location').value = item.location;
            document.getElementById('edit-date').value = item.date;
            document.getElementById('edit-contact').value = item.contactInfo;
            document.getElementById('edit-description').value = item.description;

            // show editModal
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            
            // collect
            const updatedData = {
                title: document.getElementById('edit-title').value,
                location: document.getElementById('edit-location').value,
                date: document.getElementById('edit-date').value,
                contactInfo: document.getElementById('edit-contact').value,
                description: document.getElementById('edit-description').value
            };

            const res = await fetch(`/api/items/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedData)
            });

            if (res.ok) {
                closeModal(); 
                fetchMyPosts(); 
            } else {
                alert('Failed to update item.');
            }
        });

        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'Active' ? 'Resolved' : 'Active';
            const res = await fetch(`/api/items/${id}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            if (res.ok) fetchMyPosts();
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;
            const res = await fetch(`/api/items/${id}`, { method: 'DELETE' });
            if (res.ok) fetchMyPosts();
        }

        fetchMyPosts();
    </script>
</body>
</html>
