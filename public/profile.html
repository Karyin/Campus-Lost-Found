<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Campus L&F</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #f8f8f9; color: #333; line-height: 1.6; }

        .navbar { background-color: #000000; display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; color: white; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 24px; font-weight: normal; letter-spacing: 1px; }
        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-links a { color: white; text-decoration: none; font-size: 15px; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: #cccccc; }
        .nav-btn-white { background-color: white; color: black !important; padding: 10px 18px; border-radius: 20px; font-weight: bold !important; transition: background 0.2s; }
        .nav-btn-white:hover { background-color: #e2e2e2; }

        .main-container { 
            flex: 1; 
            display: flex; 
            align-items: flex-start; 
            justify-content: center; 
            padding-top: 100px; 
        }

        .profile-card {
            background: white; width: 100%; max-width: 450px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 40px; text-align: center;
        }

        .avatar {
            width: 80px; height: 80px; background: #000; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            font-weight: bold; margin: 0 auto 20px; text-transform: uppercase;
        }

        .profile-card h2 { font-size: 24px; margin-bottom: 5px; }
        .user-email { color: #888; font-size: 14px; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #555; }
        
        .input-readonly { background: #f0f0f0; color: #888; cursor: not-allowed; }
        
        input { 
            width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; 
            font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus:not(.input-readonly) { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { padding-right: 60px; }
        .toggle-btn {
            position: absolute; right: 15px; background: none; border: none; 
            color: #666; font-size: 13px; font-weight: bold; cursor: pointer; outline: none;
        }
        .toggle-btn:hover { color: #000; }

        .btn-save { 
            width: 100%; padding: 15px; background: #000; color: white; border: none; 
            border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }
        .btn-save:hover { background: #333; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .alert-msg { display: none; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: bold; }
        .alert-success { background: #dcfce7; color: #166534; }
        .alert-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">QIU Campus Lost And Found</div>
        <div class="nav-links">
            <a href="userdashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="profile-card">
            <div class="avatar" id="userAvatar">U</div>
            
            <h2 id="displayUsername">Loading...</h2>
            <p class="user-email" id="displayEmail">loading@qiu.edu.my</p>

            <div id="alertBox" class="alert-msg"></div>

            <form id="profileForm">
                <div class="form-group">
                    <label>University Email (Cannot be changed)</label>
                    <input type="email" id="edit-email" class="input-readonly" readonly />
                </div>
                
                <div class="form-group">
                    <label>New Username</label>
                    <input type="text" id="edit-username" required />
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="edit-password" placeholder="Enter a new password (min 8 chars)" minlength="8" required />
                        <button type="button" id="togglePasswordBtn" class="toggle-btn" tabindex="-1">Show</button>
                    </div>
                </div>

                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        const userEmail = localStorage.getItem('userEmail');
        let userName = localStorage.getItem('userName') || "Student";

        if (!userEmail) {
            window.location.href = 'login.html';
        }

        function initProfile() {
            document.getElementById('displayUsername').innerText = userName;
            document.getElementById('displayEmail').innerText = userEmail;
            document.getElementById('userAvatar').innerText = userName.charAt(0).toUpperCase();
            document.getElementById('edit-email').value = userEmail;
            document.getElementById('edit-username').value = userName;
        }

        initProfile();

        // Show/Hide 
        const toggleBtn = document.getElementById('togglePasswordBtn');
        const passwordInput = document.getElementById('edit-password');

        toggleBtn.addEventListener('click', () => {
            // Check if the current type is password
            const isPassword = passwordInput.getAttribute('type') === 'password';
            // If it's a password, change it to text; otherwise, change it back to password.
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            // Simultaneously change the text on the button
            toggleBtn.innerText = isPassword ? 'Hide' : 'Show';
        });

        // SUBMIT
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newUsername = document.getElementById('edit-username').value;
            const newPassword = document.getElementById('edit-password').value;
            const alertBox = document.getElementById('alertBox');

            if (newPassword.length < 8) {
                alertBox.className = 'alert-msg alert-error';
                alertBox.innerText = 'Password must be at least 8 characters long.';
                alertBox.style.display = 'block';
                return; 
            }

            try {
                const res = await fetch('/api/user/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: userEmail, 
                        newUsername: newUsername, 
                        newPassword: newPassword 
                    })
                });

                if (res.ok) {
                    localStorage.setItem('userName', newUsername);
                    userName = newUsername; 
                    initProfile(); 
                    
                    alertBox.className = 'alert-msg alert-success';
                    alertBox.innerText = 'Profile updated successfully!';
                    alertBox.style.display = 'block';

                    document.getElementById('edit-password').value = '';
                    // 提交成功后，把输入框改回 password 状态并重置按钮文字
                    passwordInput.setAttribute('type', 'password');
                    toggleBtn.innerText = 'Show';

                    setTimeout(() => alertBox.style.display = 'none', 3000);
                } else {
                    const data = await res.json();
                    alertBox.className = 'alert-msg alert-error';
                    alertBox.innerText = data.error || 'Failed to update profile.';
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                console.error("Update error:", err);
                alert("Server error, please try again.");
            }
        });
    </script>
</body>
</html>
