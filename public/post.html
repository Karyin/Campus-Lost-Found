<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Item - Campus L&F</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #f8f8f9; color: #333; line-height: 1.6; }

        .navbar { background-color: #000000; display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; color: white; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 24px; font-weight: normal; letter-spacing: 1px; }
        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-links a { color: white; text-decoration: none; font-size: 15px; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: #cccccc; }
        .nav-btn-white { background-color: white; color: black !important; padding: 10px 18px; border-radius: 20px; font-weight: bold !important; transition: background 0.2s; }
        .nav-btn-white:hover { background-color: #e2e2e2; }

        .back-btn { border: 1px solid white; padding: 5px 15px; border-radius: 15px; transition: 0.3s; }
        .back-btn:hover { background: white; color: black; }

        .container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 25px; font-size: 28px; text-align: center; letter-spacing: -1px; }

        .form-group { margin-bottom: 20px; position: relative; } /* 👈 加入了 relative 方便定位字数统计 */
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #555; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

        .char-counter {
            font-size: 12px;
            color: #888;
            text-align: right;
            margin-top: 5px;
            display: block;
        }

        .image-preview { 
            width: 100%; height: 200px; background: #f0f0f0; border: 2px dashed #ccc; 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            margin-top: 10px; overflow: hidden; color: #999;
        }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }

       .btn-submit { 
            width: 100%; padding: 15px; background: #000; color: white; border: none; 
            border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background: #333; transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">QIU Campus Lost And Found</div>
        <div class="nav-links">
            <a href="userdashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <h2>Post New Item</h2>
        <form id="postForm">
            <div class="form-group">
                <label>Item Type</label>
                <select id="category" required>
                    <option value="Lost">I Lost Something</option>
                    <option value="Found">I Found Something</option>
                </select>
            </div>

            <div class="form-group">
                <label>Item Name (e.g., Blue Wallet)</label>
                <input type="text" id="title" placeholder="What did you find/lose?" maxlength="100" required />
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" placeholder="e.g., Library Level 2" maxlength="100" required />
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" required />
            </div>

            <div class="form-group">
                <label>Contact Information</label>
                <input type="text" id="contact" placeholder="e.g., 012-3456789 / gmail" maxlength="100" required />
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3" placeholder="Any specific details?" maxlength="100"></textarea>
                <span class="char-counter" id="descCounter">0/100</span>
            </div>

            <div class="form-group">
                <label>Upload Image</label>
                <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)" />
                <div class="image-preview" id="imagePreview">Image Preview</div>
            </div>

            <button type="submit" class="btn-submit">Submit Post</button>
        </form>
    </div>

    <script>
        const userEmail = localStorage.getItem('userEmail');
        if (!userEmail) {
            window.location.href = 'login.html?msg=need_login';
        }

        //Real-time word count statistics (Description)
        const descInput = document.getElementById('description');
        const descCounter = document.getElementById('descCounter');
        
        // Listen for user input events (triggered every time a character is typed)
        descInput.addEventListener('input', function() {
            const currentLength = this.value.length;
            descCounter.textContent = `${currentLength}/100`;
            
            //reaching 100 words, turn the number red to remind.
            if (currentLength >= 90) {
                descCounter.style.color = '#e74c3c'; // red
            } else {
                descCounter.style.color = '#888';    // grey
            }
        });

        let base64Image = "";

        //Automatically compress images and convert them to Base64
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    base64Image = canvas.toDataURL('image/jpeg', 0.7);

                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = `<img src="${base64Image}">`;
                }
            }
            reader.readAsDataURL(file);
        }

        //Submission Logic
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const authorEmail = localStorage.getItem('userEmail'); 
            if (!authorEmail) {
                alert("Session expired. Please login again.");
                window.location.href = 'login.html';
                return;
            }

            const itemData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                location: document.getElementById('location').value,
                date: document.getElementById('date').value,
                contactInfo: document.getElementById('contact').value,
                description: document.getElementById('description').value,
                imageUrl: base64Image,
                authorEmail: authorEmail,
                status: 'Active'
            };

            const res = await fetch('/api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(itemData)
            });

            if (res.ok) {
                alert('Success! Your item is now live.');
                window.location.href = 'userdashboard.html';
            } else {
                alert('Failed to post item.');
            }
        });
    </script>
</body>
</html>
